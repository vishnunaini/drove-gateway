name: Snapshot Build

on:
  pull_request:
    branches: [ master ]

jobs:
  snapshot-deb:
    runs-on: ubuntu-latest
    container: debian:bookworm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            debhelper-compat \
            devscripts \
            git \
            golang-go \
            lintian

      - name: Configure Git
        run: git config --global --add safe.directory "$(pwd)"

      - name: Set snapshot version in changelog
        run: |
          BASE_VERSION=$(dpkg-parsechangelog -S Version | cut -d- -f1)
          # Sanitize branch name: replace '/' and '_' with '.', strip other invalid chars
          BRANCH=$(echo "${{ github.head_ref }}" | sed 's|[/_]|.|g; s|[^a-zA-Z0-9.+~-]||g')
          SHORT_SHA=$(git rev-parse --short HEAD)
          SNAPSHOT_VERSION="${BASE_VERSION}~snapshot+${BRANCH}.${SHORT_SHA}"
          export DEBEMAIL="github-actions@github.com"
          export DEBFULLNAME="GitHub Actions"
          dch --newversion "${SNAPSHOT_VERSION}" \
              --distribution unstable \
              "Snapshot build for branch ${{ github.head_ref }} @ ${SHORT_SHA}"
          echo "SNAPSHOT_VERSION=${SNAPSHOT_VERSION}" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

      - name: Build
        run: dpkg-buildpackage -us -uc -b

      - name: Upload snapshot deb
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-deb-${{ github.head_ref }}-${{ github.sha }}
          path: ../*.deb
          retention-days: 14

  snapshot-rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - el: el9
            container: quay.io/ubi9/ubi:latest
          - el: el10
            container: quay.io/ubi10/ubi:latest
    container: ${{ matrix.container }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc \
            git \
            golang \
            systemd-rpm-macros \
            rpm-build \
            rpmdevtools \
            redhat-rpm-config

      - name: Configure Git
        run: git config --global --add safe.directory "$(pwd)"

      - name: Compute snapshot release string
        run: |
          # Sanitize branch name: replace '/' and '_' with '.', strip other invalid chars
          BRANCH=$(echo "${{ github.head_ref }}" | sed 's|[/_]|.|g; s|[^a-zA-Z0-9.]||g')
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Release 0.snapshot.<branch>.<hash> sorts below the release build (Release: 1)
          SNAPSHOT_RELEASE="0.snapshot.${BRANCH}.${SHORT_SHA}"
          echo "SNAPSHOT_RELEASE=${SNAPSHOT_RELEASE}" >> $GITHUB_ENV

      - name: Prepare sources
        run: |
          BASE_VERSION=$(grep -m1 '^drove-gateway' debian/changelog | grep -oP '\(\K[^)]+' | cut -d- -f1)
          rpmdev-setuptree
          cp rpmbuild/SPECS/drove-gateway.spec ~/rpmbuild/SPECS/
          tar --exclude='.git' --exclude='.github' --exclude='rpmbuild' \
              -czf ~/rpmbuild/SOURCES/drove-gateway-${BASE_VERSION}.tar.gz \
              --transform "s|^\./|drove-gateway/|" \
              -C . .

      - name: Build
        run: rpmbuild -ba -D "snapshot_release ${SNAPSHOT_RELEASE}" ~/rpmbuild/SPECS/drove-gateway.spec

      - name: Copy artifacts to workspace
        run: |
          mkdir -p rpm-output
          cp ~/rpmbuild/RPMS/$(uname -m)/*.rpm rpm-output/
          cp ~/rpmbuild/SRPMS/*.src.rpm        rpm-output/

      - name: Upload snapshot RPM (${{ matrix.el }})
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-rpm-${{ matrix.el }}-${{ github.head_ref }}-${{ github.sha }}
          path: rpm-output/
          retention-days: 14
