name: Debian Package Build

on:
  pull_request:
    branches: [ main, master, develop ]
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - distro: ubuntu-20.04
            container: ubuntu:20.04
            os_label: Ubuntu 20.04 (Focal)
          - distro: ubuntu-22.04
            container: ubuntu:22.04
            os_label: Ubuntu 22.04 (Jammy)
          - distro: ubuntu-24.04
            container: ubuntu:24.04
            os_label: Ubuntu 24.04 (Noble)
          - distro: debian-13
            container: debian:trixie
            os_label: Debian 13 (Trixie)
    container: ${{ matrix.container }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            devscripts \
            equivs \
            git \
            libdistro-info-perl \
            lintian \
            perl

          # Build the build-deps package from debian/control, then install it explicitly.
          rm -f ./*build-deps*.deb
          mk-build-deps --build-dep debian/control
          BUILD_DEPS_DEB=$(find . -maxdepth 1 -type f -name '*build-deps*.deb' | head -n1)
          if [ -z "${BUILD_DEPS_DEB}" ]; then
            echo "No *build-deps*.deb package found after mk-build-deps"
            exit 1
          fi
          apt-get install -y --no-install-recommends "${BUILD_DEPS_DEB}"

      - name: Ensure Go 1.23 is in PATH
        run: |
          if [ -d /usr/lib/go-1.23/bin ]; then
            echo "/usr/lib/go-1.23/bin found, adding to PATH"
            echo "/usr/lib/go-1.23/bin" >> $GITHUB_PATH
          fi

      - name: Configure Git
        run: git config --global --add safe.directory "$(pwd)"

      - name: Set snapshot version in changelog
        run: |
          BASE_VERSION=$(dpkg-parsechangelog -S Version | cut -d- -f1)
          BRANCH_NAME="${{ github.head_ref }}"
          if [ -z "${BRANCH_NAME}" ]; then
            BRANCH_NAME="${{ github.ref_name }}"
          fi
          BRANCH=$(echo "${BRANCH_NAME}" | sed 's|[/_]|.|g; s|[^a-zA-Z0-9.+~-]||g')
          SHORT_SHA=$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)
          SNAPSHOT_VERSION="${BASE_VERSION}~snapshot+${BRANCH}.${SHORT_SHA}"
          export DEBEMAIL="github-actions@github.com"
          export DEBFULLNAME="GitHub Actions"
            dch -b --newversion "${SNAPSHOT_VERSION}" \
              --distribution unstable \
              "Snapshot build for ${BRANCH_NAME} @ ${SHORT_SHA}"
          echo "SNAPSHOT_VERSION=${SNAPSHOT_VERSION}" >> "$GITHUB_ENV"

      - name: Build
        run: |
          if [ "${{ startsWith(matrix.distro, 'ubuntu-') }}" = "true" ]; then
            # Ubuntu containers may not satisfy Debian-specific Build-Depends exactly.
            # Build with deps preinstalled and skip strict checkbuilddeps gate.
            dpkg-buildpackage -us -uc -b -d
          else
            dpkg-buildpackage -us -uc -b
          fi

      - name: Verify package contents
        run: |
          ls -lh ../*.deb || echo "No .deb files generated"

          if ls ../*.deb 1> /dev/null 2>&1; then
            echo "Package contents:"
            dpkg -c ../*.deb | head -30
          fi

      - name: Verify package integrity
        run: |
          if ls ../*.deb 1> /dev/null 2>&1; then
            echo "Package information:"
            dpkg -I ../*.deb
            echo
            echo "Running lintian checks..."
            lintian -i ../*.deb || true
          fi

      - name: Generate checksums
        run: |
          cd ..
          sha256sum *.deb > SHA256SUMS-${{ matrix.distro }}.txt
          cat SHA256SUMS-${{ matrix.distro }}.txt

      - name: Stage artifacts in workspace
        run: |
          mkdir -p debian-artifacts
          mkdir -p debian-artifacts/build-logs
          cp ../*.deb debian-artifacts/
          cp ../*.changes debian-artifacts/ 2>/dev/null || true
          cp ../SHA256SUMS-${{ matrix.distro }}.txt debian-artifacts/
          cp ../*.build debian-artifacts/build-logs/ 2>/dev/null || true

      - name: Upload Debian package artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-debian-${{ matrix.distro }}-${{ github.sha }}
          path: debian-artifacts/
          retention-days: 30

      - name: Upload build logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-debian-${{ matrix.distro }}-build-logs-${{ github.sha }}
          path: debian-artifacts/build-logs/
          retention-days: 7
          if-no-files-found: ignore

