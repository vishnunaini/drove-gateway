name: Build and Push Container

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

# on:
#   push:
#     branches: [ "master" ]
#   pull_request:
#     branches: [ "master" ]

on:
  push:
    # Pattern matched against refs/tags
    tags:        
      - '*'           # Push events to every tag not containing /
      
jobs:

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build
      working-directory: .
      run: |
        go get .

    - name: Build
      working-directory: .
      run: |
        go build .
        mv nixy ./docker/


    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    - name: Resolve image tags from release type
      id: image-tags
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        IMAGE="ghcr.io/${{ github.repository }}"
        VERSION_TAG="${IMAGE}:${GITHUB_REF_NAME}"
        IS_PRERELEASE=false

        # Prefer GitHub Release prerelease flag when release already exists.
        if gh release view "${GITHUB_REF_NAME}" --json isPrerelease >/dev/null 2>&1; then
          IS_PRERELEASE="$(gh release view "${GITHUB_REF_NAME}" --json isPrerelease -q .isPrerelease)"
        elif echo "${GITHUB_REF_NAME}" | grep -Eiq '(alpha|beta|rc|snapshot|pre)'; then
          # Fallback for tags that follow prerelease naming conventions.
          IS_PRERELEASE=true
        fi

        if [ "${IS_PRERELEASE}" = "true" ]; then
          TAGS="${VERSION_TAG}"
          BODY=$(printf '%s\n' \
            'Container Image' \
            '```bash' \
            "docker pull ${VERSION_TAG}" \
            '```')
        else
          TAGS="${VERSION_TAG},${IMAGE}:latest"
          BODY=$(printf '%s\n' \
            'Container Image' \
            '```bash' \
            "docker pull ${VERSION_TAG}" \
            "docker pull ${IMAGE}:latest" \
            '```')
        fi

        echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
        echo "body<<EOF" >> "$GITHUB_OUTPUT"
        echo "${BODY}" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: docker
        push: true
        tags: ${{ steps.image-tags.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Update GitHub Release with container link
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        append_body: true
        body: ${{ steps.image-tags.outputs.body }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}