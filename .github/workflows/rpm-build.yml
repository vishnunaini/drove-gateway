name: RPM Build

on:
  pull_request:
    branches: [ main, master, develop ]
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - el: el9
            container: registry.access.redhat.com/ubi9/ubi:latest
          - el: el10
            container: registry.access.redhat.com/ubi10/ubi:latest
    container: ${{ matrix.container }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          dnf install -y \
            gcc \
            git \
            golang \
            systemd-rpm-macros \
            rpm-build \
            rpmdevtools \
            redhat-rpm-config

      - name: Configure Git
        run: git config --global --add safe.directory "$(pwd)"

      - name: Compute snapshot release string
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          BRANCH=$(echo "${BRANCH_NAME}" | sed 's|[/_]|.|g; s|[^a-zA-Z0-9.]||g')
          SHORT_SHA=$(git rev-parse --short HEAD)
          SNAPSHOT_RELEASE="0.snapshot.${BRANCH}.${SHORT_SHA}"
          echo "SNAPSHOT_RELEASE=${SNAPSHOT_RELEASE}" >> "$GITHUB_ENV"

      - name: Prepare sources
        run: |
          BASE_VERSION=$(sed -n '1s/^drove-gateway (\([^)]*\)).*/\1/p' debian/changelog | cut -d- -f1)
          rpmdev-setuptree
          cp rpmbuild/SPECS/drove-gateway.spec ~/rpmbuild/SPECS/
          # Tarball top-level dir must match %setup -n drove-gateway in spec
          tar --exclude='.git' --exclude='.github' --exclude='rpmbuild' \
              -czf ~/rpmbuild/SOURCES/drove-gateway-${BASE_VERSION}.tar.gz \
              --transform 's|^\./|drove-gateway/|' \
              -C . .

      - name: Build
        run: rpmbuild -ba -D "snapshot_release ${SNAPSHOT_RELEASE}" ~/rpmbuild/SPECS/drove-gateway.spec

      - name: Verify
        run: |
          rpm -qi  ~/rpmbuild/RPMS/$(uname -m)/drove-gateway-*.rpm
          rpm -pql ~/rpmbuild/RPMS/$(uname -m)/drove-gateway-*.rpm

      - name: Copy artifacts to workspace
        run: |
          mkdir -p rpm-output
          cp ~/rpmbuild/RPMS/$(uname -m)/*.rpm rpm-output/
          cp ~/rpmbuild/SRPMS/*.src.rpm        rpm-output/

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-rpm-${{ matrix.el }}-${{ github.sha }}
          path: rpm-output/
          retention-days: 30
        if: always()
