name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  release-deb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - distro: ubuntu-20.04
            container: ubuntu:20.04
            os_label: Ubuntu 20.04 (Focal)
          - distro: ubuntu-22.04
            container: ubuntu:22.04
            os_label: Ubuntu 22.04 (Jammy)
          - distro: ubuntu-24.04
            container: ubuntu:24.04
            os_label: Ubuntu 24.04 (Noble)
          - distro: debian-12
            container: debian:bookworm
            os_label: Debian 12 (Bookworm)
          - distro: debian-13
            container: debian:trixie
            os_label: Debian 13 (Trixie)
    container: ${{ matrix.container }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          apt-get update
          if [[ "${{ startsWith(matrix.distro, 'debian-') }}" == "true" ]]; then
            apt-get install -y --no-install-recommends \
              build-essential \
              debhelper-compat \
              dh-sequence-golang \
              devscripts \
              equivs \
              git \
              lintian \
              perl \
              curl

            # Prefer a fixed Go 1.23 toolchain package; fallback to golang-any.
            if ! apt-get install -y --no-install-recommends golang-1.23-go; then
              apt-get install -y --no-install-recommends golang-any
            fi
          else
            apt-get install -y --no-install-recommends \
              build-essential \
              debhelper-compat \
              devscripts \
              equivs \
              git \
              lintian \
              perl \
              curl

            # Keep Ubuntu aligned with Debian package intent when available.
            if ! apt-get install -y --no-install-recommends golang-1.23-go; then
              apt-get install -y --no-install-recommends golang-any || apt-get install -y --no-install-recommends golang-go
            fi
          fi

      - name: Configure Git
        run: git config --global --add safe.directory "$(pwd)"

      - name: Build
        run: |
          if [[ "${{ startsWith(matrix.distro, 'ubuntu-') }}" == "true" ]]; then
            # Ubuntu containers may not satisfy Debian-specific Build-Depends exactly.
            # Build with deps preinstalled and skip strict checkbuilddeps gate.
            dpkg-buildpackage -us -uc -b -d
          else
            dpkg-buildpackage -us -uc -b
          fi

      - name: Verify
        run: |
          dpkg -I ../*.deb
          lintian -i ../*.deb || true

      - name: Generate checksums
        run: |
          cd ..
          sha256sum *.deb > SHA256SUMS-${{ matrix.distro }}.txt
          cat SHA256SUMS-${{ matrix.distro }}.txt

      - name: Stage release assets in workspace
        run: |
          mkdir -p debian-release-assets
          cp ../*.deb debian-release-assets/
          cp ../SHA256SUMS-${{ matrix.distro }}.txt debian-release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## Debian Packages (${{ matrix.os_label }})

            ### Installation
            ```bash
            sudo dpkg -i drove-gateway_*.deb
            sudo systemctl enable drove.gateway
            sudo systemctl start drove.gateway
            ```
          files: |
            debian-release-assets/*.deb
            debian-release-assets/SHA256SUMS-${{ matrix.distro }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
